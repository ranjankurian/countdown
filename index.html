<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Workday Countdown - Modern Simple Color</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html, body { height: 100%; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #e0f7fa, #80deea); background-attachment: fixed; background-size: cover; color: #333; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 10px; min-height: 100vh; box-sizing: border-box; }
    .container { text-align: center; padding: 20px; max-width: 420px; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .current-datetime { font-size: 18px; color: #333; margin-bottom: 20px; background: rgba(255,255,255,0.8); padding: 6px 10px; border-radius: 20px; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(8px); width: fit-content; text-align: center; }
    .value { font-size: 70px; margin: 10px 0; font-weight: 700; color: #004d40; }
    .label { font-size: 20px; opacity: 0.9; color: #444; }
    .sub-value { font-size: 20px; font-weight: 400; margin-top: 8px; color: rgba(0,77,64,0.7); cursor: pointer; }
    .date { margin-top: 10px; font-size: 16px; opacity: 0.7; cursor: pointer; color: #009688; text-align: center; }
    .anim-date, .lay-date { color: #004d40; opacity: 0.5; font-size: 14px; text-align: center; cursor: pointer; }
    .date-picker-container { display: none; margin-top: 12px; }
    input[type="date"] { padding: 8px 12px; font-size: 16px; border-radius: 6px; border: none; }
    button { margin-left: 6px; padding: 6px 12px; font-size: 14px; cursor: pointer; border-radius: 6px; border: none; background: #0077cc; color: #fff; }
    #infoBtn { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; border-radius: 50%; background: #0077cc; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }
    .section-divider { width: 100%; height: 1px; background: rgba(0,77,64,0.2); margin: 15px 0; border: none; }
</style>
</head>
<body>
<div class="container">
    <div id="currentDateTime" class="current-datetime">--</div>
    <div class="label">Business Days Left</div>
    <div id="days" class="value">--</div>
    <div class="label">Business Weeks Left</div>
    <div id="weeks" class="value">--</div>
    <div id="dateDisplay" class="date">Wrap: --</div>
    <hr class="section-divider">
    <div class="sub-value" id="animCountdown">Animation: -- days / -- weeks</div>
    <div id="animDateDisplay" class="date anim-date">Wrap: --</div>
    <hr class="section-divider">
    <div class="sub-value" id="layCountdown">Layout: -- days / -- weeks</div>
    <div id="layDateDisplay" class="date lay-date">Wrap: --</div>
    <div class="date-picker-container" id="pickerContainer">
        <input type="date" id="dateInput">
        <button id="setBtn">Set</button>
        <button id="cancelBtn">Cancel</button>
    </div>
</div>
<div id="infoBtn">i</div>
<script>
(function(){
    const holidays2026 = [
        {date:"2026-01-01", name:"New Year's Day"},
        {date:"2026-01-06", name:"Epiphany"},
        {date:"2026-04-02", name:"Maundy Thursday"},
        {date:"2026-04-03", name:"Good Friday"},
        {date:"2026-05-01", name:"Labor Day"},
        {date:"2026-05-02", name:"Madrid Community Day"},
        {date:"2026-05-15", name:"Ascension Day"},
        {date:"2026-07-25", name:"Santiago Apostol"},
        {date:"2026-08-15", name:"Assumption of Mary"},
        {date:"2026-10-12", name:"National Day"},
        {date:"2026-11-01", name:"All Saints' Day"},
        {date:"2026-11-09", name:"Madrid Local Holiday"},
        {date:"2026-12-06", name:"Constitution Day"},
        {date:"2026-12-08", name:"Immaculate Conception"},
        {date:"2026-12-25", name:"Christmas Day"}
    ];

    let targetDates = {
        main: new Date("2026-11-06"),
        animation: new Date("2026-09-16"),
        layout: new Date("2026-07-10")
    };

    const daysEl = document.getElementById("days");
    const weeksEl = document.getElementById("weeks");
    const animEl = document.getElementById("animCountdown");
    const layEl = document.getElementById("layCountdown");
    const dateDisplay = document.getElementById("dateDisplay");
    const animDateDisplay = document.getElementById("animDateDisplay");
    const layDateDisplay = document.getElementById("layDateDisplay");
    const pickerContainer = document.getElementById("pickerContainer");
    const dateInput = document.getElementById("dateInput");
    const setBtn = document.getElementById("setBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const currentDateTimeEl = document.getElementById("currentDateTime");

    function isWorkingDay(date){
        const day = date.getDay();
        const iso = date.toISOString().split('T')[0];
        return day !== 0 && day !== 6 && !holidays2026.some(h => h.date === iso);
    }

    function formatDate(d){
        return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear().toString().slice(-2)}`;
    }

    function calculate(){
        const today = new Date();
        today.setHours(0,0,0,0);
        const now = new Date();
        currentDateTimeEl.textContent = `${formatDate(now)} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

        let count=0, d=new Date(today);
        while(d <= targetDates.main){ if(isWorkingDay(d)) count++; d.setDate(d.getDate()+1); }
        let animCount=0, ad=new Date(today);
        while(ad <= targetDates.animation){ if(isWorkingDay(ad)) animCount++; ad.setDate(ad.getDate()+1); }
        let layCount=0, ld=new Date(today);
        while(ld <= targetDates.layout){ if(isWorkingDay(ld)) layCount++; ld.setDate(ld.getDate()+1); }

        daysEl.textContent = count;
        weeksEl.textContent = Math.floor(count / 5);
        animEl.textContent = `Animation: ${animCount} days / ${Math.floor(animCount / 5)} weeks`;
        layEl.textContent = `Layout: ${layCount} days / ${Math.floor(layCount / 5)} weeks`;

        dateDisplay.textContent = `Wrap: ${formatDate(targetDates.main)}`;
        animDateDisplay.textContent = `Wrap: ${formatDate(targetDates.animation)}`;
        layDateDisplay.textContent = `Wrap: ${formatDate(targetDates.layout)}`;
    }

    let currentTargetKey = null;

    function openPicker(key){
        currentTargetKey = key;
        pickerContainer.style.display = 'flex';
        dateInput.valueAsDate = targetDates[key];
    }

    dateDisplay.addEventListener('click', ()=> openPicker('main'));
    animDateDisplay.addEventListener('click', ()=> openPicker('animation'));
    layDateDisplay.addEventListener('click', ()=> openPicker('layout'));

    setBtn.addEventListener('click', ()=>{
        if(currentTargetKey){
            if(confirm(`Are you sure you want to change the ${currentTargetKey} Wrap date?`)){
                targetDates[currentTargetKey] = new Date(dateInput.value);
                calculate();
                pickerContainer.style.display = 'none';
            }
        }
    });

    cancelBtn.addEventListener('click', ()=> pickerContainer.style.display='none');

    setInterval(calculate,60000);
    calculate();
})();
</script>
</body>
</html>
